{% load static %}
<header class="header">
    <div class="container">
        <div class="header-left">
            <a class="header-logo" href="{% url 'home' %}">
                <img src="{% static 'paste/images/logo.png' %}" alt="pastepun-logo">
                <span>PASTEPUN</span>
            </a>
        </div>
        <div class="header-right">
            {% if user.is_authenticated %}
            <span class="user-info">
                Hello, {{ user.username }}
            </span>
            <form action="{% url 'users:logout' %}" method="POST" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="btn auth">Sign out</button>
            </form>
            {% else %}
            <a href="{% url 'users:login' %}" class="btn auth">Login</a>
            <a href="{% url 'users:signup' %}" class="btn reg">Sign up</a>
            {% endif %}
            
            </div>
    </div>
</header>
