{% extends 'paste/base.html' %}

{% block content %}
<div class="container">
    <div class="text-display">
        <h2 class="text-title">Ваш Paste</h2>
        {% if user.is_authenticated %}
        <div class="text-btn">
            <a href="{% url 'edit_paste' hash %}">Edit</a>
        </div>
        {% endif %}
        <div class="text-content">
            {{ paste.text }}
        </div>
    </div>
</div>
{% endblock %}
