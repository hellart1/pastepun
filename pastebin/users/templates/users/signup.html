{% extends 'paste/base.html' %}

{% block content %}
        <div class="form-group">
            <h2>Регистрация</h2>
            <form action="" method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="form-error">{{ form.non_field_errors }}</div>
                {% for f in form %}
                <div class="form-group">
                    <p><label class='form-label' for="{{ f.id_for_label }}">{{f.label}}</label></p>{{f}}
                    <div class="form-error">{{ f.errors }}</div>
                </div>
                {% endfor %}
                <input type="submit" name="submit" class="btn" value="Зарегистрироваться">
                <p>Уже зарегистрированы? <a href="{% url 'users:login' %}">Войдите в систему</a>.</p>
            </form>
        </div>
{% endblock %}
